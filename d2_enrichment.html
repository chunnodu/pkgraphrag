e first goal is ambiguous, and people attempt to boil the ocean."}, {"map": "New Product Development", "parent_uri": "https://pkg.chunnodu.com/concept/ID_1879751797", "parent_label": "How to Scope First Bite for Modernization", "uri": "https://pkg.chunnodu.com/concept/ID_134235434", "label": "3. JTBD: What are the non-negotiable JTBDs? What are their current benchmarks? These become what you measure against. This forces focus only on these jobs, these tasks, this funnel and nothing else. What does success look like in meat and potatoes? This actually take time to define."}, {"map": "New Product Development", "parent_uri": "https://pkg.chunnodu.com/concept/ID_1879751797", "parent_label": "How to Scope First Bite for Modernization", "uri": "https://pkg.chunnodu.com/concept/ID_365433353", "label": "4. Parity: What must be at parity \u2014 whether it\u2019s feature, regulation or business rules? Something\u2019s gotta give in an overhaul. Naming this early prevents fantasy vision and scoping."}, {"map": "New Product Development", "parent_uri": "https://pkg.chunnodu.com/concept/ID_1879751797", "parent_label": "How to Scope First Bite for Modernization", "uri": "https://pkg.chunnodu.com/concept/ID_700247241", "label": "1. Business appetite/climate: This tells you how fast you need to show tangible progress or ship. Tony Fadell used to say that if you can\u2019t ship something, or show tangible promise within 6 months, no matter how ambitious that thing is, you\u2019re done. Even if leadership is still on board, your team will lose momentum. Killing your team\u2019s momentum is the worst sin."}, {"map": "New Product Development", "parent_uri": "https://pkg.chunnodu.com/concept/ID_1947073095", "parent_label": "Building Decision Architecture", "uri": "https://pkg.chunnodu.com/concept/ID_1160161625", "label": "Create the simplest possible representation"}, {"map": "New Product Development", "parent_uri": "https://pkg.chunnodu.com/concept/ID_1947073095", "parent_label": "Build async function queryOne(c) {
  try {
    const url = 'https://lookup.dbpedia.org/api/search?query=' + encodeURIComponent(c.label) + '&maxResults=3&format=json';
    const resp = await fetch(url, {headers: {'Accept': 'application/json'}});
    if (!resp.ok) return null;
    const data = await resp.json();
    for (const doc of (data.docs || [])) {
      for (const rawLabel of (doc.label || [])) {
        const clean = rawLabel.replace(/<[^>]+>/g, '').trim();
        if (clean.toLowerCase() === c.label.toLowerCase()) {
          const uri = (doc.resource || [])[0];
          if (uri) return {uri: c.uri, dbpedia: uri, label: c.label, map: c.map, parent_label: c.parent_label};
        }
      }
    }
  } catch(e) {}
  return null;
}

async function runEnrichment() {
  const PARALLEL = 5;
  const total = _d2concepts.length;
  let matched = 0;
  document.getElementById('status').textContent = 'Starting... ' + total + ' concepts';
  
  for (let i = 0; i < total; i += PARALLEL) {
    const chunk = _d2concepts.slice(i, i + PARALLEL);
    const res = await Promise.all(chunk.map(queryOne));
    for (const r of res) { if (r) { _d2results.push(r); matched++; } }
    if (i % 50 === 0) {
      document.getElementById('status').textContent = 
        'Progress: ' + i + '/' + total + ' | Matched: ' + matched;
    }
    await new Promise(r => setTimeout(r, 1000));
  }
  
  document.getElementById('status').textContent = 'DONE. Matched: ' + matched + '/' + total;
  document.getElementById('results').textContent = JSON.stringify(_d2results, null, 2);
  window._enrichmentDone = true;
}

runEnrichment();
